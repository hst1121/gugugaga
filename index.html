<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヒステリックお母さん会話ゲーム</title>
    <style>
        body {
            font-family: 'メイリオ', Meiryo, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            width: 700px;
            height: 500px;
            background-color: #fff;
            border: 2px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 8px;
        }
        #mom-face {
            height: 150px;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            border-bottom: 1px solid #ddd;
            position: relative;
        }
        #mom-face span {
            filter: grayscale(100%); /* 初期はグレー */
            transition: filter 0.3s ease-in-out;
        }
        #mom-face.angry span {
            filter: grayscale(0%); /* 怒るとカラーに */
        }
        #anger-bar-container {
            position: absolute;
            bottom: 10px;
            width: 80%;
            height: 15px;
            background-color: #eee;
            border: 1px solid #bbb;
            border-radius: 5px;
            overflow: hidden;
        }
        #anger-bar {
            height: 100%;
            width: 0%;
            background-color: #ff4d4d;
            transition: width 0.3s ease-in-out;
        }
        #dialogue-area {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: 1px solid #eee;
            line-height: 1.6;
        }
        .speaker {
            font-weight: bold;
            margin-top: 10px;
            font-size: 1.1em;
        }
        .speaker.mom { color: #d32f2f; }
        .speaker.player { color: #1976d2; }
        .text {
            margin-left: 15px;
            margin-bottom: 10px;
        }
        #choices-area {
            padding: 15px 20px;
            background-color: #f9f9f9;
            border-top: 1px solid #eee;
        }
        .choice-btn {
            display: block;
            width: 100%;
            padding: 10px 15px;
            margin-bottom: 8px;
            border: 1px solid #a0a0a0;
            background-color: #e8e8e8;
            color: #333;
            text-align: left;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            border-radius: 4px;
        }
        .choice-btn:hover {
            background-color: #d8d8d8;
            border-color: #777;
        }
        .choice-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #game-over-screen, #game-clear-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.85);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            text-align: center;
            z-index: 100;
        }
        #game-over-screen button, #game-clear-screen button {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 1em;
            background-color: #ff4d4d;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #game-clear-screen button {
            background-color: #4CAF50;
        }
        #game-over-screen button:hover { background-color: #e60000; }
        #game-clear-screen button:hover { background-color: #45a049; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="mom-face">
        <span id="mom-emoji">😡</span>
        <div id="anger-bar-container">
            <div id="anger-bar"></div>
        </div>
    </div>
    <div id="dialogue-area">
        </div>
    <div id="choices-area">
        </div>
</div>

<div id="game-over-screen" class="hidden">
    <h1>ゲームオーバー</h1>
    <p>お母さんの怒りが限界に達しました…</p>
    <button onclick="restartGame()">もう一度やり直す</button>
</div>

<div id="game-clear-screen" class="hidden">
    <h1>ゲームクリア！</h1>
    <p>お母さんを落ち着かせることができました！</p>
    <button onclick="restartGame()">もう一度プレイする</button>
</div>

<script>
    const momEmoji = document.getElementById('mom-emoji');
    const momFaceContainer = document.getElementById('mom-face');
    const angerBar = document.getElementById('anger-bar');
    const dialogueArea = document.getElementById('dialogue-area');
    const choicesArea = document.getElementById('choices-area');
    const gameOverScreen = document.getElementById('game-over-screen');
    const gameClearScreen = document.getElementById('game-clear-screen');

    let currentAnger = 50; // お母さんの初期の怒り (0-100)
    const ANGER_MAX = 100;
    const ANGER_MIN_TO_CLEAR = 20; // クリアに必要な怒りの最低値
    const INITIAL_ANGER_LEVEL = 50; // リスタート時の初期怒り
    let currentScenario = 0; // 現在の会話シナリオの段階
    let gameActive = false;

    // 会話シナリオデータ
    const scenarios = [
        {
            mom: "あんた！また部屋が散らかりっぱなしじゃない！何度言ったらわかるの！",
            angerEffect: 10, // この発言自体で少し怒りが上がる
            choices: [
                { text: "ごめん、今片付けるよ。", angerChange: -10, response: "ごめんで済むと思ってるの？いつもそうじゃない！", emoji: "😡" },
                { text: "そんなに散らかってないよ。", angerChange: +20, response: "はあ！？どこ見て言ってるの！目が節穴なの！？", emoji: "😠" },
                { text: "分かったよ、後でやるから。", angerChange: +5, response: "後でやるは今やらないってことなのよ！逃げないで！", emoji: "😤" },
            ],
            correctChoiceIdx: 0 // 正解の選択肢のインデックス
        },
        {
            mom: "だいたい、この間も言ったでしょ？靴下脱ぎっぱなしにしないでって！",
            angerEffect: 5,
            choices: [
                { text: "それは本当にごめん、気をつける。", angerChange: -15, response: "本当に気をつけるなら最初からしないの！", emoji: "😒" },
                { text: "靴下なんて大したことないだろ。", angerChange: +25, response: "大したことないって何！？そういう考えがダメなの！", emoji: "😡" },
                { text: "だって疲れてたんだもん…。", angerChange: +10, response: "疲れてるのはお母さんも一緒よ！言い訳しないで！", emoji: "😠" },
            ],
            correctChoiceIdx: 0
        },
        {
            mom: "いつもいつも口ばっかりで…本当にあなたは期待を裏切るわ！",
            angerEffect: 15,
            choices: [
                { text: "そう思わせてしまってごめん。", angerChange: -20, response: "…そう思ってるって言ってるだけよ。", emoji: "🙁" },
                { text: "期待なんてしてないでしょ。", angerChange: +30, response: "期待してるから言ってるのよ！言わなくなったら終わりよ！", emoji: "😡" },
                { text: "もう黙っててくれ…。", angerChange: +ANGE_MAX, response: "なんですって！？この親不孝者が！", emoji: "🤬" },
            ],
            correctChoiceIdx: 0 // ここでクリアに必要な怒りレベルに到達させる
        },
        {
            mom: "（少し落ち着いて）でも、あんたがちゃんと謝ってくれると、お母さんも嬉しいわ。",
            angerEffect: -100, // このセリフで怒りが大幅に下がる
            choices: [
                { text: "分かってるよ、ありがとう。", angerChange: -10, response: "（笑顔）", emoji: "😊" },
                { text: "本当にそう思ってる？", angerChange: +10, response: "疑うのね…もういいわ。", emoji: "😐" },
            ],
            correctChoiceIdx: 0, // 実質的なクリアセリフ
            isFinal: true
        }
    ];

    // ゲーム開始/リスタート
    function startGame() {
        currentAnger = INITIAL_ANGER_LEVEL;
        currentScenario = 0;
        dialogueArea.innerHTML = ''; // 会話ログをクリア
        gameOverScreen.classList.add('hidden');
        gameClearScreen.classList.add('hidden');
        gameActive = true;
        
        updateAngerBar();
        renderScenario();
    }

    // 怒りゲージの更新
    function updateAngerBar() {
        currentAnger = Math.max(0, Math.min(ANGER_MAX, currentAnger)); // 0-100に収める
        angerBar.style.width = currentAnger + '%';
        
        // 怒りレベルに応じて顔の表情と色を変える
        if (currentAnger >= 80) {
            momEmoji.textContent = "🤬";
            momFaceContainer.classList.add('angry');
        } else if (currentAnger >= 50) {
            momEmoji.textContent = "😡";
            momFaceContainer.classList.add('angry');
        } else if (currentAnger >= 30) {
            momEmoji.textContent = "😐";
            momFaceContainer.classList.remove('angry');
        } else {
            momEmoji.textContent = "😌";
            momFaceContainer.classList.remove('angry');
        }

        if (currentAnger >= ANGER_MAX) {
            gameOver();
        }
    }

    // 会話ログにメッセージを追加
    function addDialogue(speaker, text, emoji = null) {
        const speakerClass = (speaker === 'お母さん') ? 'mom' : 'player';
        const log = document.createElement('div');
        log.innerHTML = `<div class="speaker ${speakerClass}">${speaker}:</div><div class="text">${text}</div>`;
        dialogueArea.appendChild(log);
        dialogueArea.scrollTop = dialogueArea.scrollHeight; // スクロールを一番下へ
    }

    // シナリオの表示と選択肢のレンダリング
    function renderScenario() {
        if (!gameActive) return;

        const scenario = scenarios[currentScenario];
        if (!scenario) {
            console.error("シナリオが見つかりません:", currentScenario);
            return;
        }

        choicesArea.innerHTML = ''; // 選択肢をクリア

        // お母さんの発言
        currentAnger += scenario.angerEffect;
        updateAngerBar();
        addDialogue('お母さん', scenario.mom);

        if (scenario.isFinal && currentAnger <= ANGER_MIN_TO_CLEAR) {
            // クリア条件達成時の最終選択肢
            scenario.choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.classList.add('choice-btn');
                btn.textContent = choice.text;
                btn.onclick = () => selectChoice(index, scenario.isFinal);
                choicesArea.appendChild(btn);
            });
        } else if (scenario.isFinal) {
             // 最終シナリオだけど怒りがクリアラインまで下がってない場合
             addDialogue('お母さん', '（まだ少し怒りが残っているようだ…）', '😐');
             setTimeout(() => {
                 currentScenario = 0; // 最初からやり直しに強制
                 addDialogue('ゲーム', 'あなたは怒りを十分に下げることができなかったため、話は振り出しに戻った！');
                 setTimeout(() => startGame(), 2000);
             }, 2000);
             return;
        } else {
            // 通常の選択肢
            scenario.choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.classList.add('choice-btn');
                btn.textContent = choice.text;
                btn.onclick = () => selectChoice(index);
                choicesArea.appendChild(btn);
            });
        }
    }

    // 選択肢が選ばれた時の処理
    function selectChoice(choiceIndex, isFinalScenario = false) {
        if (!gameActive) return;

        const scenario = scenarios[currentScenario];
        const chosen = scenario.choices[choiceIndex];

        // 選択肢を無効化
        Array.from(choicesArea.children).forEach(btn => btn.disabled = true);

        // プレイヤーの発言
        addDialogue('あなた', chosen.text);

        // お母さんの反応
        setTimeout(() => {
            currentAnger += chosen.angerChange;
            updateAngerBar();
            addDialogue('お母さん', chosen.response);

            if (isFinalScenario && currentAnger <= ANGER_MIN_TO_CLEAR) {
                gameClear(); // クリア！
            } else if (currentAnger >= ANGER_MAX) {
                gameOver();
            } else {
                // 次のシナリオへ
                currentScenario++;
                if (currentScenario < scenarios.length) {
                    setTimeout(renderScenario, 1500); // 少し待ってから次のターン
                } else {
                    // 全シナリオを消化したがクリア条件未達の場合、最初に戻す
                    addDialogue('ゲーム', '会話は一旦落ち着いたが、お母さんはまだ不満そうだ…あなたは十分な怒りを下げることができなかったため、話は振り出しに戻った！');
                    setTimeout(() => startGame(), 2000); // 最初からやり直し
                }
            }
        }, 1000); // 1秒待ってお母さんが反応
    }

    // ゲームオーバー画面表示
    function gameOver() {
        gameActive = false;
        gameOverScreen.classList.remove('hidden');
    }

    // ゲームクリア画面表示
    function gameClear() {
        gameActive = false;
        gameClearScreen.classList.remove('hidden');
    }

    // ゲームリスタート
    function restartGame() {
        startGame();
    }

    // ゲーム開始
    startGame();
</script>
</body>
</html>
