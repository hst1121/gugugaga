<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヒステリック・マザー・トーク</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #game-container {
            width: 900px;
            height: 600px;
            border: 5px solid #a00; /* 怒りのフレーム */
            background-color: #222;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); /* 怒りのオーラ */
            overflow: hidden;
        }

        /* 背景 */
        #background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://via.placeholder.com/900x600/1e1e1e/888888?text=LivingRoom'); /* プレースホルダーのリビングルーム */
            background-size: cover;
            filter: brightness(0.7); /* 暗め */
        }

        /* お母さん */
        #mom-sprite {
            position: absolute;
            bottom: 0; right: 0;
            width: 400px; /* 大きめに表示 */
            height: 500px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom right;
            transition: transform 0.1s ease-out; /* 怒り時の振動用 */
        }

        /* 会話ボックス */
        #dialog-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: calc(100% - 40px);
            height: 180px;
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #f90;
            padding: 20px;
            box-sizing: border-box;
            font-size: 20px;
            line-height: 1.6;
        }
        #mom-dialog {
            color: #f90; /* お母さんのセリフ */
            margin-bottom: 10px;
            min-height: 60px;
        }
        #choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            background: #444;
            color: #fff;
            border: 2px solid #666;
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s, border-color 0.2s;
        }
        .choice-btn:hover, .choice-btn.selected {
            background: #666;
            border-color: #f90;
        }

        /* 怒りゲージ */
        #anger-bar-container {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 250px;
            height: 25px;
            background: #555;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #anger-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient to right, #0f0, #ff0, #f00; /* グラデーション */
            transition: width 0.3s ease-out;
        }
        #anger-label {
            position: absolute;
            top: -25px;
            left: 0;
            font-size: 14px;
            color: #ccc;
        }

        /* 結果画面 */
        #result-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
        }
        #result-screen h2 {
            font-size: 40px;
            margin-bottom: 20px;
        }
        #result-screen p {
            font-size: 20px;
            margin-bottom: 30px;
        }
        .restart-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 20px;
            cursor: pointer;
        }

        /* 操作説明 */
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #777;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="background"></div>
        <div id="mom-sprite"></div>

        <div id="anger-bar-container">
            <span id="anger-label">お母さんの不機嫌レベル</span>
            <div id="anger-bar-fill"></div>
        </div>

        <div id="dialog-box">
            <div id="mom-dialog"></div>
            <div id="choices"></div>
        </div>

        <div id="instructions">
            <strong>操作方法:</strong><br>
            ↑↓キー: 選択肢を選ぶ<br>
            Z または Enterキー: 決定
        </div>

        <div id="result-screen">
            <h2 id="result-title"></h2>
            <p id="result-message"></p>
            <button class="restart-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        const momSprite = document.getElementById('mom-sprite');
        const momDialog = document.getElementById('mom-dialog');
        const choicesDiv = document.getElementById('choices');
        const angerBarFill = document.getElementById('anger-bar-fill');
        const resultScreen = document.getElementById('result-screen');
        const resultTitle = document.getElementById('result-title');
        const resultMessage = document.getElementById('result-message');

        let currentAnger = 0; // 0から100まで
        const MAX_ANGER = 100;
        let currentScene = 0;
        let selectedChoice = 0;
        let gameActive = false;
        
        // お母さんの表情URL (プレースホルダーなので実際は画像を用意してください)
        const MOM_SPRITES = {
            normal: 'https://via.placeholder.com/400x500/800080/FFFFFF?text=Mom-Normal',      // 紫色の服のお母さん
            annoyed: 'https://via.placeholder.com/400x500/800080/FFFFFF?text=Mom-Annoyed',    // 少し眉間にシワ
            angry: 'https://via.placeholder.com/400x500/800080/FFFFFF?text=Mom-Angry',        // 完全に怒っている
            furious: 'https://via.placeholder.com/400x500/800080/FFFFFF?text=Mom-Furious'      // 鬼の形相
        };

        // 会話のシナリオデータ
        const scenario = [
            {
                dialog: "「あんた、まだそんなことしてんの？勉強は？手伝いは？」",
                choices: [
                    { text: "「今やろうとしてたよ！」", angerChange: 10, nextScene: 1 },
                    { text: "「ごめん、今すぐやる！」", angerChange: 5, nextScene: 1 },
                    { text: "「別にいいじゃん…」", angerChange: 30, nextScene: 1 } // 地雷選択肢
                ]
            },
            {
                dialog: "「いつもそうやって言い訳ばっかり！電気つけっぱなしだったでしょ！」",
                choices: [
                    { text: "「あ、本当だ！ごめん！」", angerChange: 0, nextScene: 2 },
                    { text: "「つけっぱなしじゃないよ」", angerChange: 20, nextScene: 2 },
                    { text: "（無言で頷く）", angerChange: 5, nextScene: 2 }
                ]
            },
            {
                dialog: "「で、今日の晩ご飯何がいい？冷蔵庫にあるもので何か作ってあげるけど。」",
                choices: [
                    { text: "「何でもいいよ！」", angerChange: -5, nextScene: 3 }, // 怒り減少
                    { text: "「あ、あれ食べたい！」", angerChange: 15, nextScene: 3 }, // わがままは怒り
                    { text: "「別にいらない」", angerChange: 25, nextScene: 3 }
                ]
            },
            {
                dialog: "「あんた最近、お父さんのこと手伝ってあげてる？もっと感謝しなさいよ。」",
                choices: [
                    { text: "「うん、昨日手伝ったよ！」", angerChange: -10, nextScene: 4 }, // 怒り大幅減少
                    { text: "「忙しくて…」", angerChange: 10, nextScene: 4 },
                    { text: "「お父さんこそ何もしてないじゃん」", angerChange: 40, nextScene: 4 } // 超地雷
                ]
            },
            {
                dialog: "「今日はいい子にしてたわね。たまには褒めてあげる。おやつ食べなさい。」",
                choices: [
                    { text: "（黙って受け取る）", angerChange: -20, nextScene: 5 }, // クリア！
                    { text: "「やったー！」", angerChange: -10, nextScene: 5 },
                    { text: "「別にいらないし」", angerChange: 30, nextScene: 5 } // ここで失敗もあり得る
                ]
            }
        ];

        // --- ゲーム開始/リセット ---
        function startGame() {
            currentAnger = 0;
            currentScene = 0;
            selectedChoice = 0;
            gameActive = true;
            resultScreen.style.display = 'none';
            updateAngerBar();
            loadScene(currentScene);
            momSprite.style.backgroundImage = `url(${MOM_SPRITES.normal})`;
        }

        // --- シーン読み込み ---
        function loadScene(sceneIndex) {
            if (sceneIndex >= scenario.length) {
                // 全シーンクリア！
                endGame(true);
                return;
            }

            const scene = scenario[sceneIndex];
            momDialog.innerText = scene.dialog;
            choicesDiv.innerHTML = ''; // 選択肢をクリア
            scene.choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = choice.text;
                btn.onclick = () => selectChoice(index);
                choicesDiv.appendChild(btn);
            });
            selectedChoice = 0; // 最初の選択肢をデフォルトで選択
            updateChoiceSelection();
        }

        // --- 選択肢の表示更新 ---
        function updateChoiceSelection() {
            const buttons = choicesDiv.querySelectorAll('.choice-btn');
            buttons.forEach((btn, index) => {
                btn.classList.toggle('selected', index === selectedChoice);
            });
        }

        // --- 選択肢決定処理 ---
        function selectChoice(choiceIndex) {
            if (!gameActive) return;

            const scene = scenario[currentScene];
            const chosen = scene.choices[choiceIndex];
            
            currentAnger += chosen.angerChange;
            currentAnger = Math.max(0, Math.min(MAX_ANGER, currentAnger)); // 0-100の範囲に制限

            updateAngerBar();
            updateMomSprite();

            if (currentAnger >= MAX_ANGER) {
                endGame(false); // 怒り爆発！ゲームオーバー
            } else {
                currentScene = chosen.nextScene;
                loadScene(currentScene);
            }
        }

        // --- 怒りゲージ更新 ---
        function updateAngerBar() {
            const percentage = (currentAnger / MAX_ANGER) * 100;
            angerBarFill.style.width = percentage + '%';

            // ゲージの色を怒りに応じて変える
            if (percentage < 30) angerBarFill.style.background = '#0f0';
            else if (percentage < 70) angerBarFill.style.background = '#ff0';
            else angerBarFill.style.background = '#f00';

            // 怒りレベルが高まると画面が震える
            if (percentage > 80) {
                document.getElementById('game-container').style.transform = `translateX(${Math.random()*10 - 5}px) translateY(${Math.random()*10 - 5}px)`;
                momSprite.style.transform = `translateX(${Math.random()*8 - 4}px) translateY(${Math.random()*8 - 4}px)`;
            } else {
                document.getElementById('game-container').style.transform = 'none';
                momSprite.style.transform = 'none';
            }
        }

        // --- お母さんの表情更新 ---
        function updateMomSprite() {
            const percentage = (currentAnger / MAX_ANGER) * 100;
            if (percentage < 30) momSprite.style.backgroundImage = `url(${MOM_SPRITES.normal})`;
            else if (percentage < 60) momSprite.style.backgroundImage = `url(${MOM_SPRITES.annoyed})`;
            else if (percentage < 90) momSprite.style.backgroundImage = `url(${MOM_SPRITES.angry})`;
            else momSprite.style.backgroundImage = `url(${MOM_SPRITES.furious})`;
        }

        // --- ゲーム終了処理 ---
        function endGame(isClear) {
            gameActive = false;
            resultScreen.style.display = 'flex';
            if (isClear) {
                resultTitle.innerText = "会話クリア！";
                resultTitle.style.color = '#0f0';
                resultMessage.innerText = "あなたは今日、お母さんとの会話を無事に切り抜けました！素晴らしい！";
            } else {
                resultTitle.innerText = "怒り爆発！GAME OVER";
                resultTitle.style.color = 'red';
                resultMessage.innerText = "お母さんの不機嫌レベルが限界に達しました…。リトライして次こそは！";
            }
        }

        // --- キーボード操作 ---
        window.addEventListener('keydown', e => {
            if (!gameActive) return;

            const choices = choicesDiv.querySelectorAll('.choice-btn');
            if (e.code === 'ArrowUp') {
                selectedChoice = Math.max(0, selectedChoice - 1);
                updateChoiceSelection();
            } else if (e.code === 'ArrowDown') {
                selectedChoice = Math.min(choices.length - 1, selectedChoice + 1);
                updateChoiceSelection();
            } else if (e.code === 'Enter' || e.code === 'KeyZ') {
                selectChoice(selectedChoice);
            }
        });

        // ゲーム開始
        startGame();

    </script>
</body>
</html>
