<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>しょぼんのアクション風 - 修正版</title>
    <style>
        body { background-color: #333; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #fff; }
        #game-container { position: relative; width: 800px; height: 480px; border: 4px solid #fff; background-color: #87ceeb; overflow: hidden; }
        canvas { display: block; background: transparent; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #msg-box { background: rgba(0,0,0,0.7); padding: 20px; font-size: 24px; display: none; pointer-events: auto; }
        #game-over { background: rgba(0,0,0,0.8); width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; }
        .retry-btn { margin-top: 20px; padding: 10px 20px; font-size: 18px; cursor: pointer; background: #fff; color: #000; border: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        <div id="ui-layer">
            <div id="msg-box"></div>
            <div id="game-over">
                <h1 style="color:red; font-size:60px;">GAME OVER</h1>
                <button class="retry-btn" onclick="resetGame()">リトライ (Rキー)</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgBox = document.getElementById('msg-box');
        const gameOverScreen = document.getElementById('game-over');

        // 設定
        const TILE_SIZE = 40;
        const GRAVITY = 0.6;
        const JUMP = -12;
        const SPEED = 4;

        let player = { x: 80, y: 300, w: 30, h: 30, vx: 0, vy: 0, onGround: false, dead: false };
        let scrollX = 0;
        let map = [
            "                                                  ",
            "                                                  ",
            "                                                  ",
            "                                                  ",
            "          ====                                    ",
            "                                                  ",
            "                ?    ?                            ",
            "                                                  ",
            "     ==                                           ",
            "                                  XXXXX           ",
            "#################      ###########################",
            "#################      ###########################"
        ];

        let keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'KeyR' && player.dead) resetGame();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function resetGame() {
            player = { x: 80, y: 300, w: 30, h: 30, vx: 0, vy: 0, onGround: false, dead: false };
            scrollX = 0;
            gameOverScreen.style.display = 'none';
            // 隠しブロックなどをリセットしたい場合はここでマップを再定義
            loop();
        }

        function update() {
            if (player.dead) return;

            // 移動
            player.vx = 0;
            if (keys['ArrowLeft']) player.vx = -SPEED;
            if (keys['ArrowRight']) player.vx = SPEED;

            // 重力
            player.vy += GRAVITY;
            player.x += player.vx;
            player.y += player.vy;

            // 衝突判定（簡易）
            player.onGround = false;
            let gridY = Math.floor((player.y + player.h) / TILE_SIZE);
            let gridX = Math.floor((player.x + player.w / 2 + scrollX) / TILE_SIZE);

            if (map[gridY] && (map[gridY][gridX] === '#' || map[gridY][gridX] === '=')) {
                if (player.vy > 0) {
                    player.y = gridY * TILE_SIZE - player.h;
                    player.vy = 0;
                    player.onGround = true;
                }
            }

            // 理不尽トラップ：特定の場所を通ると死ぬ、または床が消える
            if (player.x + scrollX > 600 && player.x + scrollX < 650 && player.y > 300) {
                // ここは落とし穴
            }

            // ジャンプ
            if (keys['Space'] && player.onGround) {
                player.vy = JUMP;
                player.onGround = false;
            }

            // スクロール
            if (player.x > 400) {
                scrollX += SPEED;
                player.x = 400;
            }

            // 死亡判定
            if (player.y > canvas.height || (map[gridY] && map[gridY][gridX] === 'X')) {
                player.dead = true;
                gameOverScreen.style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // マップ描画
            for (let y = 0; y < map.length; y++) {
                for (let x = 0; x < map[y].length; x++) {
                    let tile = map[y][x];
                    let dx = x * TILE_SIZE - scrollX;
                    if (tile === '#') {
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(dx, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else if (tile === '=') {
                        ctx.fillStyle = '#aaa';
                        ctx.fillRect(dx, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else if (tile === '?') {
                        ctx.fillStyle = '#f1c40f';
                        ctx.fillRect(dx, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else if (tile === 'X') {
                        ctx.fillStyle = 'red';
                        ctx.beginPath();
                        ctx.moveTo(dx, (y+1)*TILE_SIZE);
                        ctx.lineTo(dx+TILE_SIZE/2, y*TILE_SIZE);
                        ctx.lineTo(dx+TILE_SIZE, (y+1)*TILE_SIZE);
                        ctx.fill();
                    }
                }
            }

            // プレイヤー描画
            ctx.fillStyle = 'white';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.strokeStyle = 'black';
            ctx.strokeRect(player.x, player.y, player.w, player.h);
            
            // しょぼんの目
            ctx.fillStyle = 'black';
            ctx.fillRect(player.x + 5, player.y + 8, 3, 3);
            ctx.fillRect(player.x + 22, player.y + 8, 3, 3);
            ctx.beginPath();
            ctx.arc(player.x + 15, player.y + 22, 5, 0, Math.PI, true);
            ctx.stroke();
        }

        function loop() {
            update();
            draw();
            if (!player.dead) requestAnimationFrame(loop);
        }

        // 開始メッセージ
        function start() {
            msgBox.style.display = 'block';
            msgBox.innerText = "＊ 理不尽に耐えろ！ (Spaceでジャンプ)";
            setTimeout(() => {
                msgBox.style.display = 'none';
                loop();
            }, 2000);
        }

        start();
    </script>
</body>
</html>
