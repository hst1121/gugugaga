<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Getting Over It - HTML/JS Clone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.17.1/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ccc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            border: 2px solid #555;
            background-color: #000;
        }
        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 1.2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #message {
            position: absolute;
            font-size: 1.5em;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            color: #fff;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="overlay">高さ: <span id="heightDisplay">0</span>m</div>
    <div id="message"></div>

    <script>
        // Matter.js モジュールのエイリアス
        const Engine = Matter.Engine,
              Render = Matter.Render,
              World = Matter.World,
              Bodies = Matter.Bodies,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint,
              Constraint = Matter.Constraint,
              Vertices = Matter.Vertices;

        // ゲームキャンバス設定
        const canvasWidth = 800;
        const canvasHeight = 600;
        const renderHeightPadding = 100; // 描画範囲の上下パディング

        // Matter.js エンジンとレンダラーの作成
        const engine = Engine.create();
        const world = engine.world;
        engine.gravity.y = 1; // 重力設定

        const render = Render.create({
            element: document.body,
            canvas: document.getElementById('gameCanvas'),
            engine: engine,
            options: {
                width: canvasWidth,
                height: canvasHeight,
                wireframes: false, // ワイヤーフレーム表示を無効化（テクスチャ表示のため）
                background: '#000',
                pixelRatio: window.devicePixelRatio || 1 // 高解像度ディスプレイ対応
            }
        });

        Render.run(render); // レンダリング開始
        const runner = Matter.Runner.create();
        Matter.Runner.run(runner, engine); // エンジン実行開始

        // --- プレイヤー（壺男）の作成 ---
        let playerBody, playerPickaxe, playerConstraint;
        const playerSize = 50; // 壺の幅
        const pickaxeLength = 100;

        function createPlayer(x, y) {
            // 壺の形状 (台形を逆さにしたイメージ)
            const potVertices = Vertices.fromPath('0 0, 50 0, 40 50, 10 50');
            playerBody = Bodies.fromVertices(x, y, potVertices, {
                inertia: Infinity, // 回転しにくくする
                friction: 0.8,     // 摩擦を高くする
                restitution: 0,    // 反発力をなくす
                collisionFilter: { group: -1 }, // 他のプレイヤー要素との衝突を無視
                render: { fillStyle: '#b5651d' } // 壺の色
            });

            // ピッケル (細長い長方形)
            playerPickaxe = Bodies.rectangle(x + 50, y - pickaxeLength / 2, 10, pickaxeLength, {
                mass: 5, // ピッケルは軽めに
                friction: 0.5,
                restitution: 0.1,
                render: { fillStyle: '#777' } // ピッケルの色
            });

            // ピッケルをプレイヤーの壺に結合
            playerConstraint = Constraint.create({
                bodyA: playerBody,
                pointA: { x: playerBody.vertices[0].x - playerBody.position.x + 25, y: playerBody.vertices[0].y - playerBody.position.y + 10 }, // 壺の上部中心あたりに結合
                bodyB: playerPickaxe,
                pointB: { x: 0, y: -pickaxeLength / 2 + 10 }, // ピッケルの上部に結合
                stiffness: 0.9,
                length: 0
            });

            World.add(world, [playerBody, playerPickaxe, playerConstraint]);
        }

        // --- 地形と障害物の作成 ---
        function createGroundAndObstacles() {
            // 下部の地面
            World.add(world, Bodies.rectangle(canvasWidth / 2, 700, canvasWidth * 2, 200, { isStatic: true, render: { fillStyle: '#333' } }));

            // 簡単な足場（スタート地点）
            World.add(world, Bodies.rectangle(canvasWidth / 2, 600, 300, 20, { isStatic: true, angle: 0.05, render: { fillStyle: '#444' } }));
            World.add(world, Bodies.rectangle(canvasWidth / 2 + 200, 550, 150, 20, { isStatic: true, angle: -0.1, render: { fillStyle: '#444' } }));

            // ちょっとした壁
            World.add(world, Bodies.rectangle(canvasWidth / 2 - 150, 500, 20, 100, { isStatic: true, render: { fillStyle: '#555' } }));

            // 最初の大きな岩
            World.add(world, Bodies.fromVertices(canvasWidth / 2 + 100, 400, Vertices.fromPath('0 0, 100 0, 120 50, 80 100, 20 80'), {
                isStatic: true, render: { fillStyle: '#666' }
            }));
            
            // 狭い通路
            World.add(world, Bodies.rectangle(canvasWidth / 2 + 250, 300, 20, 150, { isStatic: true, render: { fillStyle: '#555' } }));
            World.add(world, Bodies.rectangle(canvasWidth / 2 + 350, 250, 20, 150, { isStatic: true, angle: 0.2, render: { fillStyle: '#555' } }));

            // 空中に浮かぶ足場
            World.add(world, Bodies.rectangle(canvasWidth / 2 - 100, 100, 200, 20, { isStatic: true, angle: -0.08, render: { fillStyle: '#444' } }));
            World.add(world, Bodies.rectangle(canvasWidth / 2 + 150, 0, 100, 20, { isStatic: true, angle: 0.15, render: { fillStyle: '#444' } }));
            World.add(world, Bodies.rectangle(canvasWidth / 2 + 300, -100, 100, 20, { isStatic: true, angle: -0.05, render: { fillStyle: '#444' } }));

            // 最終目標地点
            World.add(world, Bodies.rectangle(canvasWidth / 2, -200, 400, 20, { isStatic: true, render: { fillStyle: '#0f0' } })); // ゴールは緑
            World.add(world, Bodies.rectangle(canvasWidth / 2, -250, 20, 100, { isStatic: true, render: { fillStyle: '#0a0' } }));
        }

        // --- マウス操作 (ピッケルを動かす) ---
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false } // マウスとオブジェクトを繋ぐ線を見せない
            }
        });
        World.add(world, mouseConstraint);

        // レンダラーにマウスのイベントを同期させる
        render.mouse = mouse;

        // --- カメラ（画面スクロール）と高さ表示 ---
        let currentCameraY = 0; // 現在のカメラの中心Y座標
        const heightDisplay = document.getElementById('heightDisplay');
        const initialPlayerY = 600; // プレイヤーの初期Y座標 (地面の少し上)

        function updateCamera() {
            if (playerBody) {
                // プレイヤーのY座標が画面の上端に近づいたらカメラを上に移動
                const playerScreenY = playerBody.position.y - (currentCameraY - canvasHeight / 2);

                if (playerScreenY < canvasHeight * 0.4) { // 画面の40%より上に行ったらカメラを追従
                    currentCameraY = playerBody.position.y + canvasHeight * 0.1;
                }
                
                // カメラのY座標をRenderに適用
                Render.lookAt(render, {
                    min: { x: 0, y: currentCameraY - canvasHeight / 2 - renderHeightPadding },
                    max: { x: canvasWidth, y: currentCameraY + canvasHeight / 2 + renderHeightPadding }
                });

                // 高さの表示更新 (Matter.jsはY軸が下向き正なので、反転して初期位置からの差を計算)
                const currentHeight = Math.floor((initialPlayerY - playerBody.position.y) / 10); // 10pxを1mと仮定
                heightDisplay.textContent = Math.max(0, currentHeight); // 負の高さにはしない
                
                // ゴール判定
                if (playerBody.position.y < -150) { // ゴール地点の少し上
                    showMessage("おめでとう！あなたは頂上に達しました！", true);
                    // ゲームを停止するか、リセットするか
                    Engine.clear(engine); // 物理エンジンをクリア
                    World.clear(world, false); // ワールドをクリア
                    Render.stop(render); // レンダリング停止
                    Matter.Runner.stop(runner); // ランナー停止
                }
            }
        }

        // --- メッセージ表示関数 ---
        const messageDiv = document.getElementById('message');
        function showMessage(text, isGoal = false) {
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            messageDiv.style.opacity = 1;
            if (isGoal) {
                messageDiv.style.color = '#0f0';
                messageDiv.style.fontSize = '2.5em';
            }
        }
        
        // --- 初期化 ---
        function initGame() {
            createPlayer(canvasWidth / 2, 600); // プレイヤーの初期位置
            createGroundAndObstacles(); // 地形生成
            
            // エンジンの更新イベントにカメラ更新をフック
            Matter.Events.on(engine, 'afterUpdate', updateCamera);

            // 初期メッセージ
            showMessage("マウスでピッケルを操作し、地形を掴んで登れ！");
            setTimeout(() => {
                messageDiv.style.opacity = 0;
                setTimeout(() => messageDiv.style.display = 'none', 500);
            }, 5000); // 5秒後にメッセージを消す
        }

        initGame(); // ゲーム開始
    </script>
</body>
</html>
