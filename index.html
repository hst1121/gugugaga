<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>THE HYSTERIC MOTHER - NIGHTMARE EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: "Hiragino Kaku Gothic ProN", sans-serif; }
        #game-container { width: 800px; height: 600px; border: 6px solid #400; background: #1a1a1a; position: relative; overflow: hidden; transition: 0.1s; }
        
        /* 怒りの赤い霧 */
        #anger-overlay { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; box-shadow: inset 0 0 100px rgba(255,0,0,0); transition: 0.5s; z-index: 10; }

        /* お母さんのビジュアル */
        #mom-figure { position: absolute; bottom: -20px; right: 20px; width: 450px; height: 550px; background-size: contain; background-repeat: no-repeat; background-position: bottom; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5; }

        /* UI要素 */
        #ui-panel { position: absolute; top: 20px; left: 20px; z-index: 20; width: 300px; }
        .bar-bg { width: 100%; height: 20px; background: #333; border: 2px solid #fff; margin-bottom: 5px; }
        #anger-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff0, #f00); transition: 0.3s; }
        #timer-bar { height: 100%; width: 100%; background: #0af; }

        /* メッセージ */
        #msg-window { position: absolute; bottom: 20px; left: 20px; width: 760px; height: 220px; background: rgba(0,0,0,0.9); border: 3px solid #600; padding: 20px; box-sizing: border-box; z-index: 30; }
        #mom-text { color: #ff4444; font-size: 22px; font-weight: bold; margin-bottom: 15px; min-height: 60px; line-height: 1.4; }
        #choice-list { display: grid; gap: 8px; }
        .choice-item { background: #222; border: 1px solid #444; color: #ccc; padding: 10px; cursor: pointer; font-size: 16px; text-align: left; }
        .choice-item:hover, .choice-item.active { background: #444; border-color: #f00; color: #fff; }

        /* エンディング */
        #ending-card { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; display:none; z-index:100; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding: 40px; box-sizing: border-box; }
        .ending-title { font-size: 40px; margin-bottom: 20px; font-weight: bold; }
        .ending-text { font-size: 20px; line-height: 1.6; margin-bottom: 30px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="anger-overlay"></div>
    <div id="ui-panel">
        <div style="font-size:12px; color:#aaa;">MOTHER'S IRRITATION</div>
        <div class="bar-bg"><div id="anger-bar"></div></div>
        <div style="font-size:12px; color:#aaa;">REMAINING PATIENCE (TIME)</div>
        <div class="bar-bg"><div id="timer-bar"></div></div>
    </div>

    <div id="mom-figure"></div>

    <div id="msg-window">
        <div id="mom-text"></div>
        <div id="choice-list"></div>
    </div>

    <div id="ending-card">
        <div id="ed-title" class="ending-title"></div>
        <div id="ed-text" class="ending-text"></div>
        <button onclick="location.reload()" style="padding:10px 30px; cursor:pointer;">最初からやり直す</button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const momFig = document.getElementById('mom-figure');
    const momText = document.getElementById('mom-text');
    const choiceList = document.getElementById('choice-list');
    const angerBar = document.getElementById('anger-bar');
    const timerBar = document.getElementById('timer-bar');
    const angerOverlay = document.getElementById('anger-overlay');

    let anger = 0;
    let currentStep = 0;
    let timeLimit = 100;
    let timerInterval;
    let selectedIdx = 0;

    // お母さんの表情（プレースホルダー画像：実際はもっと怖いものに差し替え可能）
    const IMGS = {
        low: "https://via.placeholder.com/450x550/200/fff?text=STERN+LOOK",
        mid: "https://via.placeholder.com/450x550/600/fff?text=VEIN+POPPING",
        high: "https://via.placeholder.com/450x550/a00/fff?text=GENUINE+RAGE"
    };

    const script = [
        {
            mom: "「…で？ あんた、いつまでその座り方してるわけ？ 行儀が悪いって100万回言わせるつもり？」",
            choices: [
                { t: "「あ、ごめん…（すぐ直す）」", a: 5 },
                { t: "「今やろうとしてたよ」", a: 15 },
                { t: "「100万回は盛ってるでしょ」", a: 40 }
            ]
        },
        {
            mom: "「その口の利き方！ 誰に育ててもらったと思ってるの？ 私が若い頃はねぇ…（長い愚痴が始まった）」",
            choices: [
                { t: "（ひたすら頷く）", a: 2 },
                { t: "「お母さんの時は大変だったんだね」", a: -5 },
                { t: "「またその話？」", a: 30 }
            ]
        },
        {
            mom: "「大体あんたはいつもそう！ こないだのテストの結果だって、お父さんには内緒にしてあげてるのに！」",
            choices: [
                { t: "「本当に感謝してる。次は頑張るよ」", a: -10 },
                { t: "「頼んでないし…」", a: 35 },
                { t: "「お父さんに言えば？」", a: 50 }
            ]
        },
        {
            mom: "「何その顔？ 何か不満でもあるわけ？ 言いたいことがあるならハッキリ言いなさいよ！」",
            choices: [
                { t: "「不満なんてないよ、いつもありがとう」", a: -15 },
                { t: "「……（沈黙）」", a: 15 },
                { t: "「お母さんのその性格だよ！」", a: 100 }
            ]
        }
    ];

    function init() {
        anger = 20; // 最初から少し不機嫌
        renderStep();
        startTimer();
    }

    function startTimer() {
        timeLimit = 100;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLimit -= 1.5; // 難易度：秒速で減る
            timerBar.style.width = timeLimit + "%";
            if (timeLimit <= 0) {
                applyAnger(20, "「ちょっと！無視してんじゃないわよ！」");
                startTimer();
            }
        }, 100);
    }

    function renderStep() {
        if (currentStep >= script.length) {
            finish();
            return;
        }
        const data = script[currentStep];
        momText.innerText = "";
        typeWriter(data.mom);
        
        choiceList.innerHTML = "";
        data.choices.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = "choice-item";
            div.innerText = c.t;
            div.onclick = () => select(i);
            choiceList.appendChild(div);
        });
        selectedIdx = 0;
        updateChoiceFocus();
    }

    function typeWriter(txt) {
        let i = 0;
        const speed = 30;
        function type() {
            if (i < txt.length) {
                momText.innerText += txt.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }

    function select(idx) {
        const choice = script[currentStep].choices[idx];
        applyAnger(choice.a);
        currentStep++;
        if (anger < 100) {
            renderStep();
            startTimer();
        }
    }

    function applyAnger(val, alertMsg) {
        anger += val;
        if (anger < 0) anger = 0;
        if (anger >= 100) {
            anger = 100;
            gameOver();
        }
        updateUI();
        if (alertMsg) momText.innerText = alertMsg;
    }

    function updateUI() {
        angerBar.style.width = anger + "%";
        
        // 演出：怒りレベルで画像と背景変化
        if (anger > 80) {
            momFig.style.backgroundImage = `url(${IMGS.high})`;
            angerOverlay.style.boxShadow = "inset 0 0 150px rgba(255,0,0,0.8)";
            container.style.borderColor = "#f00";
        } else if (anger > 40) {
            momFig.style.backgroundImage = `url(${IMGS.mid})`;
            angerOverlay.style.boxShadow = "inset 0 0 80px rgba(255,100,0,0.4)";
        } else {
            momFig.style.backgroundImage = `url(${IMGS.low})`;
            angerOverlay.style.boxShadow = "none";
        }

        // 振動
        if (anger > 60) {
            container.style.transform = `translate(${(Math.random()-0.5)*10}px, ${(Math.random()-0.5)*10}px)`;
        }
    }

    function gameOver() {
        clearInterval(timerInterval);
        showEnding("ENDING: 爆発", "「もういい！ 出て行きなさい！！」\nあなたの不用意な一言が、ついに核のボタンを押した。一晩中、家から締め出されることになった。", "#f00");
    }

    function finish() {
        clearInterval(timerInterval);
        if (anger < 30) {
            showEnding("ENDING: 平穏な夜", "「たまには分かればいいのよ。ほら、林檎剥いたから食べなさい。」\nあなたは完璧に立ち回った。お母さんは上機嫌になり、平和な夜が約束された。", "#0f0");
        } else {
            showEnding("ENDING: 氷河期", "「……ふん。分かればいいのよ、分かれば。」\nなんとか爆発は免れた。しかし、お母さんの機嫌は直っておらず、明日の朝まで冷戦状態が続く。気まずい。", "#ff0");
        }
    }

    function showEnding(title, text, color) {
        document.getElementById('ending-card').style.display = "flex";
        document.getElementById('ed-title').innerText = title;
        document.getElementById('ed-title').style.color = color;
        document.getElementById('ed-text').innerText = text;
    }

    // キー操作
    window.addEventListener('keydown', e => {
        if (document.getElementById('ending-card').style.display === "flex") return;
        const items = document.querySelectorAll('.choice-item');
        if (e.key === "ArrowDown") selectedIdx = (selectedIdx + 1) % items.length;
        if (e.key === "ArrowUp") selectedIdx = (selectedIdx + items.length - 1) % items.length;
        if (e.key === "Enter" || e.key === "z") select(selectedIdx);
        updateChoiceFocus();
    });

    function updateChoiceFocus() {
        const items = document.querySelectorAll('.choice-item');
        items.forEach((it, i) => it.classList.toggle('active', i === selectedIdx));
    }

    init();
</script>
</body>
</html>
